name: Update F1 Fantasy prices

on:
  schedule:
    - cron: "0 6 * * 2,5"   # Tuesdays & Fridays, 06:00 UTC
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python and network info
        run: |
          python --version
          python - <<'PY'
          import socket
          hosts = [
              "fantasy-api.formula1.com",
              "fantasy.formula1.com",
              "api.formula1.com",
              "formula1.com"
          ]
          for host in hosts:
              try:
                  print(host, socket.gethostbyname(host))
              except Exception as e:
                  print(host, "FAILED:", e)
          PY

      - name: Run scraper with debug
        run: python scrape_prices.py --debug

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain prices.json)" ]; then
            git config user.name  "prices-bot"
            git config user.email "actions@users.noreply.github.com"
            git add prices.json
            git commit -m "Update prices $(date -u +%F)"
            git push
          else
            echo "No price changes."
          fi
